name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install tools
        run: aftman install

      - name: Lint
        run: selene src

      - name: Build plugin
        run: rojo build default.project.json --output UIImporterPro.rbxm
